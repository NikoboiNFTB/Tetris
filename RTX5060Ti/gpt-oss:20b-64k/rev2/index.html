<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Tetris</title>
    <style>
        body {
            background: #111;
            color: #eee;
            font-family: sans-serif;
            text-align: center;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        canvas {
            background: #000;
            border: 2px solid #fff;
            display: block;
            margin: 10px auto;
        }

        #info {
            margin: 10px;
        }

        #info div {
            margin: 4px;
        }
    </style>
</head>

<body>
    <h1>Tetris</h1>
    <canvas id="tetris" width="300" height="600"></canvas>
    <div id="info">
        <div id="score">Score: 0</div>
        <div id="level">Level: 1</div>
        <div id="lines">Lines: 0</div>
    </div>
    <script>
        const canvas = document.getElementById('tetris');
        const ctx = canvas.getContext('2d');
        const ROWS = 20, COLS = 10;
        const BLOCK_SIZE = 30;
        ctx.scale(BLOCK_SIZE, BLOCK_SIZE);

        const COLORS = ['cyan', 'blue', 'orange', 'yellow', 'green', 'purple', 'red'];
        const SHAPES = [
            [], // empty rotation
            [[0, 0], [1, 0], [2, 0], [3, 0]], // I
            [[0, 0], [1, 0], [0, 1], [1, 1]], // O
            [[0, 0], [1, 0], [1, 1], [2, 1]], // S
            [[0, 1], [1, 1], [1, 0], [2, 0]], // Z
            [[0, 0], [1, 0], [2, 0], [1, 1]], // T
            [[0, 0], [0, 1], [1, 1], [2, 1]], // J
            [[2, 0], [0, 1], [1, 1], [2, 1]]  // L
        ];

        class Tetris {
            constructor(ctx) {
                this.ctx = ctx;
                this.grid = this.createMatrix(ROWS, COLS);
                this.score = 0; this.lines = 0; this.level = 1;
                this.dropCounter = 0; this.dropInterval = 1000;
                this.lastTime = 0;
                this.player = { matrix: null, pos: { x: 0, y: 0 }, rotate: 0 };
                this.resetNext();
                this.updateScore();
                this.updateLevel();
                this.updateLines();
                this.loop = this.loop.bind(this);
                this.initControls();
                requestAnimationFrame(this.loop);
            }
            createMatrix(rows, cols) {
                const matrix = [];
                while (rows--) matrix.push(new Array(cols).fill(0));
                return matrix;
            }
            updateScore() { document.getElementById('score').textContent = 'Score: ' + this.score; }
            updateLevel() { document.getElementById('level').textContent = 'Level: ' + this.level; }
            updateLines() { document.getElementById('lines').textContent = 'Lines: ' + this.lines; }
            clear() {
                this.ctx.fillStyle = '#000';
                this.ctx.fillRect(0, 0, COLS, ROWS);
            }
            drawMatrix(matrix, offset) {
                matrix.forEach((row, y) => {
                    row.forEach((value, x) => {
                        if (value !== 0) {
                            this.ctx.fillStyle = COLORS[value];
                            this.ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
                        }
                    });
                });
            }
            draw() {
                this.clear();
                this.drawMatrix(this.grid, { x: 0, y: 0 });
                this.drawMatrix(this.player.matrix, this.player.pos);
            }
            merge() {
                this.player.matrix.forEach((row, y) => {
                    row.forEach((value, x) => {
                        if (value !== 0) this.grid[y + this.player.pos.y][x + this.player.pos.x] = value;
                    });
                });
            }
            collided() {
                const m = this.player.matrix;
                const o = this.player.pos;
                for (let y = 0; y < m.length; ++y) {
                    for (let x = 0; x < m[y].length; ++x) {
                        if (m[y][x] !== 0 &&
                            (this.grid[y + o.y] &&
                                this.grid[y + o.y][x + o.x] !== 0)) {
                            return true;
                        }
                    }
                }
                return false;
            }
            rotate(matrix, dir) {
                for (let y = 0; y < matrix.length; ++y) {
                    for (let x = 0; x < y; ++x) {
                        [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
                    }
                }
                if (dir > 0) {
                    matrix.forEach(row => row.reverse());
                } else {
                    matrix.reverse();
                }
            }
            playerRotate(dir) {
                const pos = this.player.pos.x;
                let offset = 1;
                this.rotate(this.player.matrix, dir);
                while (this.collided()) {
                    this.player.pos.x += offset;
                    offset = -(offset + (offset > 0 ? 1 : -1));
                    if (offset > this.player.matrix[0].length) {
                        this.rotate(this.player.matrix, -dir);
                        this.player.pos.x = pos;
                        return;
                    }
                }
            }
            playerDrop() {
                this.player.pos.y++;
                if (this.collided()) {
                    this.player.pos.y--;
                    this.merge();
                    this.resetPlayer();
                    this.clearLines();
                }
                this.dropCounter = 0;
            }
            playerMove(dir) {
                this.player.pos.x += dir;
                if (this.collided()) this.player.pos.x -= dir;
            }
            resetPlayer() {
                const [x, y] = this.nextShape;
                this.player.matrix = this.shapes[x];
                this.player.pos.x = (COLS - this.player.matrix[0].length) / 2 | 0;
                this.player.pos.y = 0;
                this.player.rotate = 0;
                if (this.collided()) {
                    this.grid.forEach(row => row.fill(0)); // game over
                    this.score = 0; this.lines = 0; this.level = 1;
                    this.updateScore(); this.updateLevel(); this.updateLines();
                    alert('Game Over!');
                }
            }
            resetNext() {
                this.shapes = [];
                for (let i = 0; i < SHAPES.length; i++) {
                    if (i === 0) continue;
                    this.shapes.push(this.createPiece(i));
                }
                this.nextShape = this.randomShape();
            }
            createPiece(type) {
                const matrix = this.shapes[type % this.shapes.length];
                return matrix.map(row => row.map(val => val !== 0 ? type : 0));
            }
            randomShape() {
                return this.shapes[Math.floor(Math.random() * this.shapes.length)];
            }
            clearLines() {
                outer: for (let y = ROWS - 1; y > 0; --y) {
                    for (let x = 0; x < COLS; ++x) {
                        if (this.grid[y][x] === 0) continue outer;
                    }
                    const row = this.grid.splice(y, 1)[0].fill(0);
                    this.grid.unshift(row);
                    ++y;
                    this.score += 10 * this.level;
                    this.lines += 1;
                    if (this.lines % 10 === 0) this.level += 1;
                    this.dropInterval = 1000 - (this.level - 1) * 100;
                    this.updateScore(); this.updateLevel(); this.updateLines();
                }
            }
            loop(time = 0) {
                const delta = time - this.lastTime;
                this.lastTime = time;
                this.dropCounter += delta;
                if (this.dropCounter > this.dropInterval) this.playerDrop();
                this.draw();
                requestAnimationFrame(this.loop);
            }
            initControls() {
                document.addEventListener('keydown', event => {
                    if (event.keyCode === 37) this.playerMove(-1);
                    else if (event.keyCode === 39) this.playerMove(1);
                    else if (event.keyCode === 40) this.playerDrop();
                    else if (event.keyCode === 81) this.playerRotate(-1); // Q
                    else if (event.keyCode === 87) this.playerRotate(1);  // W
                });
            }
        }

        new Tetris(ctx);
    </script>
</body>

</html>
