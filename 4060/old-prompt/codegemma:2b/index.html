<html>

<head>
    <link rel="stylesheet" href="https://unpkg.com/tailwindcss@^1.0/dist/tailwind.min.css">
    <script src="https://unpkg.com/react@16/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@16/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/tetris@0.17/dist/index.js"></script>
</head>

<body>
    <div id="tetris">
        <div class="border border-black p-2">
            <p class="text-center text-2xl">Tetris</p>
            <div class="flex justify-center">
                <div class="grid w-full grid-rows-1 grid-cols-10">
                    <div>
                        <div id="tetris-tetromino"></div>
                        <div id="tetris-board"></div>
                        <div id="tetris-score"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        const tetris = Tetris();
        tetris.startGame();
    </script>
</body>

</html>
