<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tetris</title>
    <!-- Stylesheet -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="<KEY>" crossorigin="anonymous" />
</head>

<body class="d-flex flex-column">
    <!-- Navbar -->
    <nav class="navbar navbar-light bg-light mb-2">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="/" class="navbar-brand">Tetris</a>

            <form action="/logout" method="post" id="logout-form"></form>

            <button form="logout-form" class="btn btn-danger btn-sm">
                Logout
            </button>
        </div>
    </nav>

    <!-- Game Container -->
    <main class="container d-flex justify-content-center mb-auto">
        <canvas id="tetris-canvas"></canvas>
    </main>

    <!-- Footer -->
    <footer class="text-center mt-4 py-2">
        Created by <NAME>
    </footer>

    <!-- JavaScript -->
    <script src="/js/game.js"></script>
</body>

</html>
