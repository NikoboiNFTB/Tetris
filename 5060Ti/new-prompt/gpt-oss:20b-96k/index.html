<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tetris</title>
<style>
  :root {
    --gap: 2px;
    --empty: #111;
    --border: #333;
  }

  html, body {
    height: 100%;
    margin: 0;
    background:#222;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial,Helvetica,sans-serif;
    color:#fff;
  }
  .game {
    display:flex;
    gap:30px;
    flex-wrap:wrap;
    justify-content:center;
  }
  /* Board */
  .board {
    display:grid;
    grid-template-columns:repeat(10,1fr);
    grid-auto-rows:1fr;
    width:80vw;
    max-width:400px;
    aspect-ratio:10/20;
    gap:var(--gap);
    background:#444;
  }
  .board .cell {
    background:var(--empty);
    border:1px solid var(--border);
    width:100%;
    height:100%;
    box-sizing:border-box;
  }
  /* Next preview */
  .next {
    display:grid;
    grid-template-columns:repeat(4,1fr);
    grid-auto-rows:1fr;
    width:30vw;
    max-width:150px;
    aspect-ratio:4/4;
    gap:var(--gap);
    background:#444;
    margin-bottom:10px;
  }
  .next .cell{
    background:var(--empty);
    border:1px solid var(--border);
    width:100%;
    height:100%;
    box-sizing:border-box;
  }
  /* Sidebar */
  .sidebar{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
  }
  .score{
    font-size:1.2em;
  }
  button{
    padding:10px 20px;
    font-size:1em;
    cursor:pointer;
  }
</style>
</head>
<body>
<div class="game">
  <div class="board" id="board"></div>
  <div class="sidebar">
    <div class="next" id="next"></div>
    <div class="score" id="score">Score: 0</div>
    <button id="restart" style="display:none;">Restart</button>
  </div>
</div>

<script>
/* =====================================================
   Tetris Game Implementation
   ===================================================== */

// ----- CONFIG -------------------------------------------------
const COLS = 10;
const ROWS = 20;
const GRAVITY_INTERVAL = 500;     // ms
const SOFT_DROP_INTERVAL = 50;    // ms
const LINE_SCORE = 100;           // points per cleared line

// ----- TETROMINO DEFINITIONS ----------------------------------
const TETROMINOES = {
  I: {
    color: '#00ffff',
    rotations: [
      [[0,1],[1,1],[2,1],[3,1]],
      [[2,0],[2,1],[2,2],[2,3]],
      [[0,2],[1,2],[2,2],[3,2]],
      [[1,0],[1,1],[1,2],[1,3]]
    ]
  },
  O: {
    color: '#ffff00',
    rotations: [
      [[1,0],[2,0],[1,1],[2,1]],
      [[1,0],[2,0],[1,1],[2,1]],
      [[1,0],[2,0],[1,1],[2,1]],
      [[1,0],[2,0],[1,1],[2,1]]
    ]
  },
  T: {
    color: '#800080',
    rotations: [
      [[1,0],[0,1],[1,1],[2,1]],
      [[1,0],[1,1],[2,1],[1,2]],
      [[0,1],[1,1],[2,1],[1,2]],
      [[1,0],[0,1],[1,1],[1,2]]
    ]
  },
  S: {
    color: '#00ff00',
    rotations: [
      [[1,0],[2,0],[0,1],[1,1]],
      [[1,0],[1,1],[2,1],[2,2]],
      [[1,1],[2,1],[0,2],[1,2]],
      [[0,0],[0,1],[1,1],[1,2]]
    ]
  },
  Z: {
    color: '#ff0000',
    rotations: [
      [[0,0],[1,0],[1,1],[2,1]],
      [[2,0],[1,1],[2,1],[1,2]],
      [[0,1],[1,1],[1,2],[2,2]],
      [[1,0],[0,1],[1,1],[0,2]]
    ]
  },
  J: {
    color: '#0000ff',
    rotations: [
      [[0,0],[0,1],[1,1],[2,1]],
      [[1,0],[2,0],[1,1],[1,2]],
      [[0,1],[1,1],[2,1],[2,2]],
      [[1,0],[1,1],[0,2],[1,2]]
    ]
  },
  L: {
    color: '#ff8000',
    rotations: [
      [[2,0],[0,1],[1,1],[2,1]],
      [[1,0],[1,1],[1,2],[2,2]],
      [[0,1],[1,1],[2,1],[0,2]],
      [[0,0],[1,0],[1,1],[1,2]]
    ]
  }
};

// ----- STATE ----------------------------------------------------
let board;               // 2D array of colors or null
let currentPiece;        // object {type, rotation, x, y, color}
let nextPieceDef;        // tetromino definition for next piece
let score = 0;
let gravityTimer;
let softDropTimer;

// ----- DOM ELEMENTS ---------------------------------------------
const boardEl = document.getElementById('board');
const nextEl = document.getElementById('next');
const scoreEl = document.getElementById('score');
const restartBtn = document.getElementById('restart');

// ----- INITIALIZATION --------------------------------------------
function init() {
  createBoardArray();
  createBoardDOM();
  createNextDOM();
  spawnPiece();
  render();
  startGravity();
}

// Create empty board array
function createBoardArray() {
  board = Array.from({length: ROWS}, () => Array(COLS).fill(null));
}

// Create DOM cells for board (10x20)
function createBoardDOM() {
  boardEl.innerHTML = '';
  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      const cell = document.createElement('div');
      cell.classList.add('cell');
      cell.dataset.row = y;
      cell.dataset.col = x;
      boardEl.appendChild(cell);
    }
  }
}

// Create DOM cells for next preview (4x4)
function createNextDOM() {
  nextEl.innerHTML = '';
  for (let y = 0; y < 4; y++) {
    for (let x = 0; x < 4; x++) {
      const cell = document.createElement('div');
      cell.classList.add('cell');
      cell.dataset.row = y;
      cell.dataset.col = x;
      nextEl.appendChild(cell);
    }
  }
}

// ----- GAME LOGIC -----------------------------------------------
function spawnPiece() {
  const types = Object.keys(TETROMINOES);
  if (!nextPieceDef) {
    // First piece
    const type = types[Math.floor(Math.random() * types.length)];
    nextPieceDef = TETROMINOES[type];
  }
  const pieceDef = nextPieceDef;
  // Generate new next piece
  const type = types[Math.floor(Math.random() * types.length)];
  nextPieceDef = TETROMINOES[type];
  // Spawn current piece at top center (using 4x4 bounding box)
  currentPiece = {
    type: pieceDef.type,
    rotation: 0,
    x: 3,
    y: 0,
    color: pieceDef.color,
    shape: pieceDef.rotations[0]
  };
  if (!canMovePiece(currentPiece, 0, 0, currentPiece.rotation)) {
    endGame();
  }
  renderNext();
}

// Check if piece can be placed at position (dx,dy) with rotation
function canMovePiece(piece, dx, dy, rotation) {
  const shape = TETROMINOES[piece.type].rotations[rotation];
  for (const [bx, by] of shape) {
    const x = piece.x + dx + bx;
    const y = piece.y + dy + by;
    if (x < 0 || x >= COLS || y < 0 || y >= ROWS) return false;
    if (board[y][x]) return false;
  }
  return true;
}

// Move piece left/right/down
function movePiece(dx, dy) {
  if (canMovePiece(currentPiece, dx, dy, currentPiece.rotation)) {
    currentPiece.x += dx;
    currentPiece.y += dy;
    render();
    return true;
  } else {
    // If moving down and collision -> lock piece
    if (dy === 1) {
      lockPiece();
    }
    return false;
  }
}

// Rotate piece clockwise
function rotatePiece() {
  const newRot = (currentPiece.rotation + 1) % 4;
  if (canMovePiece(currentPiece, 0, 0, newRot)) {
    currentPiece.rotation = newRot;
    currentPiece.shape = TETROMINOES[currentPiece.type].rotations[newRot];
    render();
  }
}

// Lock current piece into board
function lockPiece() {
  const shape = TETROMINOES[currentPiece.type].rotations[currentPiece.rotation];
  for (const [bx, by] of shape) {
    const x = currentPiece.x + bx;
    const y = currentPiece.y + by;
    if (y >= 0 && y < ROWS && x >= 0 && x < COLS) {
      board[y][x] = currentPiece.color;
    }
  }
  clearLines();
  spawnPiece();
  render();
}

// Hard drop: instantly place piece at lowest possible position
function hardDrop() {
  while (movePiece(0, 1));
}

// Clear any full lines
function clearLines() {
  let linesCleared = 0;
  for (let y = ROWS - 1; y >= 0; y--) {
    if (board[y].every(cell => cell)) {
      board.splice(y, 1);
      board.unshift(Array(COLS).fill(null));
      linesCleared++;
      y++; // recheck same row index after shift
    }
  }
  if (linesCleared > 0) {
    score += linesCleared * LINE_SCORE;
    scoreEl.textContent = 'Score: ' + score;
  }
}

// ----- RENDERING -----------------------------------------------
function render() {
  // Render static board
  const cells = boardEl.children;
  for (let i = 0; i < cells.length; i++) {
    const cell = cells[i];
    const y = parseInt(cell.dataset.row);
    const x = parseInt(cell.dataset.col);
    const color = board[y][x];
    cell.style.background = color || 'var(--empty)';
  }
  // Render current piece
  const shape = TETROMINOES[currentPiece.type].rotations[currentPiece.rotation];
  for (const [bx, by] of shape) {
    const x = currentPiece.x + bx;
    const y = currentPiece.y + by;
    if (x >= 0 && x < COLS && y >= 0 && y < ROWS) {
      const idx = y * COLS + x;
      cells[idx].style.background = currentPiece.color;
    }
  }
}

function renderNext() {
  const cells = nextEl.children;
  const shape = TETROMINOES[nextPieceDef.type].rotations[0];
  // Clear preview
  for (const cell of cells) cell.style.background = 'var(--empty)';
  // Render preview piece
  for (const [bx, by] of shape) {
    if (bx >= 0 && bx < 4 && by >= 0 && by < 4) {
      const idx = by * 4 + bx;
      cells[idx].style.background = nextPieceDef.color;
    }
  }
}

// ----- GRAVITY -----------------------------------------------
function startGravity() {
  gravityTimer = setInterval(() => {
    if (!movePiece(0, 1)) {
      // piece locked inside movePiece if down blocked
    }
  }, GRAVITY_INTERVAL);
}

function stopGravity() {
  clearInterval(gravityTimer);
}

// ----- EVENT HANDLERS ------------------------------------------
document.addEventListener('keydown', e => {
  switch (e.keyCode) {
    case 37: // left
      e.preventDefault();
      movePiece(-1, 0);
      break;
    case 39: // right
      e.preventDefault();
      movePiece(1, 0);
      break;
    case 40: // down (soft drop)
      e.preventDefault();
      if (!softDropTimer) {
        softDropTimer = setInterval(() => {
          if (!movePiece(0, 1)) {
            // Piece locked inside movePiece
          }
        }, SOFT_DROP_INTERVAL);
      }
      break;
    case 38: // up (rotate)
      e.preventDefault();
      rotatePiece();
      break;
    case 32: // space (hard drop)
      e.preventDefault();
      hardDrop();
      break;
  }
});

document.addEventListener('keyup', e => {
  if (e.keyCode === 40 && softDropTimer) {
    clearInterval(softDropTimer);
    softDropTimer = null;
  }
});

restartBtn.addEventListener('click', () => {
  restartGame();
});

// ----- GAME OVER -----------------------------------------------
function endGame() {
  stopGravity();
  restartBtn.style.display = 'block';
}

// ----- RESTART -----------------------------------------------
function restartGame() {
  score = 0;
  scoreEl.textContent = 'Score: 0';
  restartBtn.style.display = 'none';
  createBoardArray();
  render();
  nextPieceDef = null;
  spawnPiece();
  startGravity();
}

// ----- START ----------------------------------------------------
init();
</script>
</body>
</html>
